apply plugin: 'com.android.application'

android {
    namespace 'com.herdmate.tagreapersentinel'
    compileSdk 34

    defaultConfig {
        applicationId "com.herdmate.tagreapersentinel"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "0.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation(name: 'DeviceAPI_ver20251103_release', ext: 'aar')
}
